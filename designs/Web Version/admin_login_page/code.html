<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>System Login | The Artisanal Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#fff8f8",
              "on-secondary-fixed": "#221b00",
              "background": "#fff8f8",
              "secondary": "#705d00",
              "surface-container-lowest": "#ffffff",
              "outline-variant": "#e0bec8",
              "outline": "#8c6f79",
              "surface-variant": "#ecdfe1",
              "surface-tint": "#b8006d",
              "on-error": "#ffffff",
              "secondary-fixed-dim": "#e9c400",
              "primary": "#b00068",
              "on-secondary": "#ffffff",
              "surface-container": "#f8ebed",
              "inverse-on-surface": "#fbeef0",
              "primary-fixed-dim": "#ffb0cd",
              "on-tertiary": "#ffffff",
              "on-surface": "#201a1c",
              "on-error-container": "#93000a",
              "error": "#ba1a1a",
              "surface-bright": "#fff8f8",
              "on-tertiary-fixed-variant": "#534345",
              "inverse-surface": "#362f30",
              "surface-container-high": "#f2e5e7",
              "on-primary-fixed": "#3e0021",
              "on-surface-variant": "#584049",
              "secondary-container": "#fcd400",
              "surface-dim": "#e3d7d9",
              "primary-container": "#d62083",
              "on-secondary-container": "#6e5c00",
              "on-background": "#201a1c",
              "secondary-fixed": "#ffe16d",
              "on-tertiary-fixed": "#25181a",
              "surface-container-highest": "#ecdfe1",
              "on-primary": "#ffffff",
              "on-primary-container": "#fff7f8",
              "error-container": "#ffdad6",
              "on-tertiary-container": "#fff8f8",
              "on-secondary-fixed-variant": "#544600",
              "tertiary-container": "#816e71",
              "inverse-primary": "#ffb0cd",
              "tertiary-fixed": "#f5dde0",
              "tertiary": "#685658",
              "primary-fixed": "#ffd9e4",
              "on-primary-fixed-variant": "#8d0052",
              "surface-container-low": "#fdf0f2"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #fff8f8; /* Canvas color from system */
            font-family: 'Inter', sans-serif;
        }
        .auth-card {
            box-shadow: 0 4px 24px hsla(0,0%,0%,0.08);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer-move 2s infinite linear;
        }
        @keyframes shimmer-move {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .input-focus-ring:focus {
            outline: 2px solid #3b82f6; /* Semantic blue focus as requested */
            outline-offset: 1px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-surface">
<!-- The Auth Shell is Suppressed for Login as per Task Rules -->
<main class="w-full max-w-[400px] px-4">
<!-- Branding Section -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="mb-4">
<h1 class="font-headline italic font-bold text-3xl text-primary tracking-tight">Nellai Aanantham</h1>
<p class="text-xs font-label uppercase tracking-[0.2em] text-on-surface-variant opacity-60 mt-1">Management Portal</p>
</div>
</div>
<!-- Authentication Card -->
<div class="auth-card bg-surface-container-lowest rounded-xl p-8 border border-surface-container">
<header class="mb-8">
<h2 class="font-body font-semibold text-[22px] leading-tight text-on-surface">System Login</h2>
<p class="text-on-surface-variant text-sm mt-2 font-body opacity-80">Access the artisanal editor control panel.</p>
</header>
<form class="space-y-4">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl">mail</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-low border-b-2 border-outline-variant/20 rounded-t-lg font-body text-on-surface leading-[1.5] input-focus-ring transition-all placeholder:text-outline/50" id="email" name="email" placeholder="admin@nellai.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl">lock</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-low border-b-2 border-outline-variant/20 rounded-t-lg font-body text-on-surface leading-[1.5] input-focus-ring transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary CTA -->
<div class="pt-4">
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-on-primary font-body font-semibold rounded-lg overflow-hidden relative group hover:opacity-90 transition-all flex items-center justify-center gap-2" type="submit">
<span class="shimmer absolute inset-0 opacity-30"></span>
<span class="relative">Sign In</span>
<span class="material-symbols-outlined relative text-lg">login</span>
</button>
</div>
<!-- Tertiary Action -->
<div class="flex justify-center pt-2">
<button class="text-primary font-body text-sm hover:underline transition-all" type="button">
                        Forgot Password?
                    </button>
</div>
</form>
</div>
<!-- Footer / Support -->
<footer class="mt-12 text-center space-y-4">
<p class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant/40">
                © 2024 The Artisanal Editor Bakery Management
            </p>
<div class="flex justify-center gap-6 opacity-60">
<a class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy</a>
<a class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Security</a>
<a class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors" href="#">Support</a>
</div>
</footer>
</main>
<!-- Decoration Layer (Asymmetric Flourishes) -->
<div class="fixed top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] -z-10"></div>
<div class="fixed bottom-[-10%] right-[-5%] w-[30%] h-[30%] bg-secondary-container/10 rounded-full blur-[100px] -z-10"></div>
</body></html>
