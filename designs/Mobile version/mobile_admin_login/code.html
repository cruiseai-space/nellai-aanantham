<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>Artisanal Admin - Sign In</title>

              "surface-bright": "#fff8f8",

              "error": "#ba1a1a",

              "on-tertiary-fixed": "#25181a",
              "primary-fixed": "#ffd9e4",
              "secondary-fixed-dim": "#e9c400",
              "secondary": "#705d00",
              "on-tertiary": "#ffffff",
              "on-primary-fixed": "#3e0021",
              "tertiary": "#685658",

              "on-background": "#201a1c",
              "error-container": "#ffdad6",
              "surface-container-high": "#f2e5e7",
              "surface": "#fff8f8",
              "inverse-on-surface": "#fbeef0",
              "on-secondary-fixed": "#221b00",
              "on-primary-container": "#fff7f8",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#fff8f8",
              "inverse-primary": "#ffb0cd",

            fontFamily: {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .artisanal-gradient {
            background: linear-gradient(135deg, #b00068 0%, #d62083 100%);
        }
        .ambient-shadow {
            box-shadow: 0 1px 3px hsla(0, 0%, 0%, 0.04), 0 10px 40px -10px hsla(350, 50%, 20%, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Suppression: Not rendered for Transactional Auth Screen -->
<main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
<!-- Abstract Background Decorative Elements -->
<div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-surface-container rounded-full blur-3xl opacity-50"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-80 h-80 bg-primary-fixed opacity-20 rounded-full blur-3xl"></div>
<!-- Authentication Card -->
<div class="w-full max-w-[400px] bg-surface-container-lowest rounded-xl p-8 ambient-shadow z-10">
<!-- Brand Header -->
<div class="text-center mb-10">
<h1 class="font-headline text-3xl font-bold text-primary italic mb-2">Artisanal Admin</h1>
<p class="text-on-surface-variant text-sm tracking-tight opacity-80">Welcome back to the studio</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 px-4 py-3 rounded-t-lg text-sm transition-all placeholder:text-on-surface-variant/40" placeholder="curator@artisanal.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-xs font-semibold uppercase tracking-wider text-on-surface-variant">Password</label>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 px-4 py-3 rounded-t-lg text-sm transition-all placeholder:text-on-surface-variant/40" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-2 space-y-4">
<button class="w-full artisanal-gradient text-on-primary font-semibold py-4 rounded-lg shadow-md hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="text-center">
<button class="text-primary text-sm font-medium hover:bg-surface-container-high px-4 py-2 rounded-full transition-colors" type="button">
                            Forgot Password?
                        </button>
</div>
</div>
</form>
<!-- Bottom Note -->
<div class="mt-12 pt-8 border-t border-surface-container-high text-center">
<p class="text-xs text-on-surface-variant leading-relaxed">
                    Access restricted to authorized editorial staff only.<br/>
                    Need an account? <a class="text-primary font-semibold" href="#">Contact Management</a>
</p>
</div>
</div>
</main>
<!-- Visual Anchor / Editorial Image Background (Mobile Optimized) -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-[0.03]">
<img alt="" class="w-full h-full object-cover" data-alt="Close-up of artisan pastries arranged elegantly on a marble table with soft editorial morning light and warm tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC0XHQSErvhaT9i-BouF_bmHhHPI1kIg0McpA9nj6tqRb_ghGWq3N47vG-B1qLDdEN6pHWCexlSr6_7qFbPwk7eZ0I8kKC3CrHsYI8agiJJOSduJ2UEokVFpmful-eApPoX9X-D72rLt2y6Lek8jqV6T1pkrWOoMlqSen_jHq0rIkxsbWAx6VudUutlfB5x5yalXyk_vvZtGFPGgJ0yhJHupo4Q_ldCJWZ-JavvO6TyZjd9F40WY7gbW03Fb4pkSOpwzTe902KOTVU"/>
</div>
<!-- Navigation Shell Suppressed as per Task-Focused Page Rule (Auth) -->
</body></html>
