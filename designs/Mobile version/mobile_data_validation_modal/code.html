<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);

            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e0bec8;
            border-radius: 10px;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-sans text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- Top App Bar -->
<header class="docked full-width top-0 sticky z-50 no-border bg-[#fff8f8] backdrop-blur-md shadow-[0_1px_3px_hsla(0,0%,0%,0.04)]">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<button class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-[#fdf0f2] transition-colors active:opacity-80 active:scale-95">
<span class="material-symbols-outlined text-[#b00068]">menu</span>
</button>
<h1 class="font-serif text-xl font-bold text-[#b00068] italic">Artisanal Admin</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-fixed">
<img alt="Admin Profile" class="w-full h-full object-cover" data-alt="professional portrait of a head chef wearing a white toque in a bright modern kitchen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWR8LxMwMCHfc693IsjwQIIUAC8pAmlz0tQX8qbTBZZWITiNhb-rgLMiLMiJuV6_PDjtgCJVZpe8oHQ6I88DDHi0FWDy2Gpw3WJRA_UCA79TiAfrb28H5Uh_1DG-Et0kFSPIGh-XhR3VzJVmsWNu1-ngenf_65bgQwHWIzCChS5A7uyejVvsBlAyGel2B_yOhEVFJ1sAqoO9D9Jid0Bt01YDEHcP0Ct7OtDIqLVKJw0YupAFFp9gNRDV-EyHk7mXiv1eTABR8LkSU"/>
</div>
</div>
</header>
<!-- Main Content Background (Mocking underlying dashboard) -->
<main class="flex-grow p-6 space-y-8 overflow-y-auto opacity-40 select-none">
<section class="space-y-4">
<div class="h-8 w-48 bg-surface-container-high rounded-lg"></div>
<div class="grid grid-cols-2 gap-4">
<div class="h-32 bg-surface-container-lowest rounded-xl shadow-sm"></div>
<div class="h-32 bg-surface-container-lowest rounded-xl shadow-sm"></div>
</div>
<div class="h-64 bg-surface-container-lowest rounded-xl shadow-sm w-full"></div>
</section>
</main>
<!-- Validation Modal / Bottom Sheet Overlay -->
<div class="fixed inset-0 z-[60] bg-on-surface/20 backdrop-blur-16 flex flex-col justify-end">
<div class="bg-surface rounded-t-[2rem] shadow-[0_-10px_40px_-10px_hsla(350,50%,20%,0.15)] flex flex-col max-h-[813px] w-full">
<!-- Handle -->
<div class="w-full flex justify-center py-4">
<div class="w-12 h-1.5 bg-outline-variant/30 rounded-full"></div>
</div>
<!-- Header -->
<div class="px-6 pb-4">
<h2 class="font-serif text-2xl font-bold text-on-surface tracking-tight">Review Parsed Data</h2>
<p class="text-sm text-on-surface-variant mt-1">We've extracted 8 ingredients from your invoice. Please verify before insertion.</p>
</div>
<!-- Editable List / Table -->
<div class="flex-grow overflow-y-auto px-6 py-2 custom-scrollbar">
<div class="space-y-4 pb-8">
<!-- Table Header -->
<div class="grid grid-cols-[1fr_60px_80px] gap-4 px-2 text-[11px] font-bold uppercase tracking-widest text-outline">
<span>Ingredient</span>
<span class="text-center">Qty</span>
<span class="text-right">Cost</span>
</div>
<!-- List Items -->
<div class="space-y-3">
<!-- Item 1 -->
<div class="grid grid-cols-[1fr_60px_80px] gap-4 items-center bg-surface-container-lowest p-3 rounded-xl shadow-[0_1px_2px_rgba(0,0,0,0.02)] border border-surface-container-low">
<input class="bg-transparent border-none p-0 text-sm font-medium focus:ring-0 text-on-surface w-full h-11" type="text" value="Organic Rye Flour"/>
<input class="bg-transparent border-none p-0 text-sm text-center focus:ring-0 text-on-surface-variant h-11" type="text" value="25kg"/>
<input class="bg-transparent border-none p-0 text-sm text-right font-semibold focus:ring-0 text-primary h-11" type="text" value="$42.50"/>
</div>
<!-- Item 2 -->
<div class="grid grid-cols-[1fr_60px_80px] gap-4 items-center bg-surface-container-lowest p-3 rounded-xl shadow-[0_1px_2px_rgba(0,0,0,0.02)] border border-surface-container-low">
<input class="bg-transparent border-none p-0 text-sm font-medium focus:ring-0 text-on-surface w-full h-11" type="text" value="Madagascar Vanilla"/>
<input class="bg-transparent border-none p-0 text-sm text-center focus:ring-0 text-on-surface-variant h-11" type="text" value="500ml"/>
<input class="bg-transparent border-none p-0 text-sm text-right font-semibold focus:ring-0 text-primary h-11" type="text" value="$115.00"/>
</div>
<!-- Item 3 - Highlighted Issue -->
<div class="grid grid-cols-[1fr_60px_80px] gap-4 items-center bg-secondary-container/10 p-3 rounded-xl border border-secondary-container/30">
<input class="bg-transparent border-none p-0 text-sm font-medium focus:ring-0 text-on-surface w-full h-11" type="text" value="Cultured Butter"/>
<input class="bg-transparent border-none p-0 text-sm text-center focus:ring-0 text-on-surface-variant h-11" type="text" value="10kg"/>
<input class="bg-transparent border-none p-0 text-sm text-right font-semibold focus:ring-0 text-primary h-11" type="text" value="$88.20"/>
</div>
<!-- Item 4 -->
<div class="grid grid-cols-[1fr_60px_80px] gap-4 items-center bg-surface-container-lowest p-3 rounded-xl shadow-[0_1px_2px_rgba(0,0,0,0.02)] border border-surface-container-low">
<input class="bg-transparent border-none p-0 text-sm font-medium focus:ring-0 text-on-surface w-full h-11" type="text" value="Sea Salt Flakes"/>
<input class="bg-transparent border-none p-0 text-sm text-center focus:ring-0 text-on-surface-variant h-11" type="text" value="2kg"/>
<input class="bg-transparent border-none p-0 text-sm text-right font-semibold focus:ring-0 text-primary h-11" type="text" value="$18.90"/>
</div>
<!-- Item 5 -->
<div class="grid grid-cols-[1fr_60px_80px] gap-4 items-center bg-surface-container-lowest p-3 rounded-xl shadow-[0_1px_2px_rgba(0,0,0,0.02)] border border-surface-container-low">
<input class="bg-transparent border-none p-0 text-sm font-medium focus:ring-0 text-on-surface w-full h-11" type="text" value="Lavender Honey"/>
<input class="bg-transparent border-none p-0 text-sm text-center focus:ring-0 text-on-surface-variant h-11" type="text" value="5kg"/>
<input class="bg-transparent border-none p-0 text-sm text-right font-semibold focus:ring-0 text-primary h-11" type="text" value="$64.00"/>
</div>
</div>
</div>
</div>
<!-- Sticky Footer -->
<footer class="p-6 bg-surface-container-low space-y-3">
<button class="w-full h-12 bg-gradient-to-br from-primary to-primary-container text-on-primary font-semibold rounded-xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">verified</span>
                    Confirm &amp; Insert Data
                </button>
<button class="w-full h-12 bg-transparent text-primary font-medium rounded-xl hover:bg-surface-container-highest transition-colors active:scale-[0.98]">
                    Discard
                </button>
</footer>
</div>
</div>

<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Orders</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 px-3 py-1.5 active:scale-110 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Users</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 px-3 py-1.5 active:scale-110 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Roles</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#fcd400] text-black rounded-xl px-3 py-1.5 shadow-sm active:scale-110 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="rule">rule</span>
<span class="font-sans text-[11px] font-medium tracking-wide uppercase mt-1">Validation</span>
</a>
</nav>
